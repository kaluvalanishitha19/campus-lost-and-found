<section class="toolbar">
  <input
    type="text"
    class="search-box"
    placeholder="Search by title, description, or location…"
    [(ngModel)]="searchTerm"
    (ngModelChange)="onSearchChange()"
  />

  <select [(ngModel)]="kind" (ngModelChange)="onFilterChange()">
    <option value="">All items</option>
    <option value="lost">Lost</option>
    <option value="found">Found</option>
  </select>

  <select [(ngModel)]="category" (ngModelChange)="onFilterChange()">
    <option value="">All categories</option>
    <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
  </select>

  <select [(ngModel)]="status" (ngModelChange)="onFilterChange()">
    <option value="">Any status</option>
    <option value="open">Open</option>
    <option value="claimed">Claimed</option>
    <option value="returned">Returned</option>
  </select>

  <select [(ngModel)]="sort" (ngModelChange)="onFilterChange()">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
  </select>

  <button type="button" (click)="clearFilters()">Clear filters</button>
  <a routerLink="/report" class="report-link">+ Report an item</a>
</section>

<p class="result-count" *ngIf="!loading">{{ total }} item{{ total === 1 ? '' : 's' }} found</p>

<div class="state-message" *ngIf="loading">Loading items…</div>
<div class="state-message error" *ngIf="error">{{ error }}</div>
<div class="state-message" *ngIf="!loading && !error && items.length === 0">
  No items match your search. Try clearing a filter.
</div>

<ul class="item-grid" *ngIf="!loading && !error && items.length > 0">
  <li class="item-card" *ngFor="let item of items">
    <a [routerLink]="['/items', item.id]">
      <span class="kind-badge" [class]="item.kind">{{ item.kind }}</span>
      <span class="status-badge" [class]="item.status">{{ statusLabel(item.status) }}</span>
      <h3>{{ item.title }}</h3>
      <p class="location">{{ item.location }}</p>
      <p class="case-number">{{ item.case_number }}</p>
    </a>
  </li>
</ul>
